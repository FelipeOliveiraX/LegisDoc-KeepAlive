name: LegisDoc Keep Alive

on:
  schedule:
    # Horário de Brasília (UTC-3): 06h às 22h
    # Horário UTC: 09h às 01h (do dia seguinte)
    # Executa a cada 14 minutos para evitar que o Render entre em hibernação (limite de 15m)
    - cron: '*/14 9-23,0-1 * * *'
  workflow_dispatch: # Permite que você execute manualmente no GitHub para testar

jobs:
  ping-backend:
    name: Manter Backend Ativo
    runs-on: ubuntu-latest
    steps:
      - name: Enviando Ping para o Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://legisdoc.onrender.com/)
          echo "------------------------------------------------"
          echo "URL: https://legisdoc.onrender.com/"
          echo "Status de Retorno: $STATUS"
          echo "Horário (UTC): $(date)"
          echo "------------------------------------------------"
          
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Sucesso: O Backend está acordado!"
          else
            echo "ℹ️ O status $STATUS foi recebido. Mesmo se for erro, a requisição externa costuma ser o suficiente para o Render iniciar o boot."
          fi
